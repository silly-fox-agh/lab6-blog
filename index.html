<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lab6-supabase</title>
  </head>
  <body class="bg-gray-100 p-8 font-sans text-gray-800 min-h-screen">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-blue-600">Baza Wiedzy</h1>

    <div class="mb-6 bg-white p-4 rounded shadow flex items-center gap-4">
      <label for="sort-select" class="font-bold">Sortuj:</label>
      <select id="sort-select" class="p-2 border rounded border-gray-300 focus:outline-none focus:border-blue-500">
        <option value="created_at.desc">Najnowsze (data malejąco)</option>
        <option value="created_at.asc">Najstarsze (data rosnąco)</option>
        <option value="title.asc">Alfabetycznie (tytuł)</option>
      </select>
    </div>

    <div id="articles-container" class="space-y-6 mb-12">
      <p class="text-gray-500 text-center py-10 italic">Ładowanie artykułów...</p>
    </div>

    <div class="bg-white p-6 rounded shadow border-t-4 border-blue-600">
      <h2 class="text-2xl font-bold mb-4">Opublikuj Artykuł</h2>
      <form id="add-article-form" class="space-y-4">
        <div>
          <label for="title" class="block font-medium">Tytuł artykułu *</label>
          <input type="text" id="title" required class="w-full border border-gray-300 p-2 rounded" />
        </div>
        <div>
          <label for="subtitle" class="block font-medium">Podtytuł</label>
          <input type="text" id="subtitle" class="w-full border border-gray-300 p-2 rounded" />
        </div>
        <div>
          <label for="author" class="block font-medium">Imię i nazwisko autora</label>
          <input type="text" id="author" class="w-full border border-gray-300 p-2 rounded" />
        </div>
        <div>
          <label for="content" class="block font-medium">Główna treść artykułu *</label>
          <textarea id="content" required class="w-full border border-gray-300 p-2 rounded h-32"></textarea>
        </div>
        <div>
          <label for="created_at" class="block font-medium">Data i czas utworzenia *</label>
          <input type="datetime-local" id="created_at" required class="w-full border border-gray-300 p-2 rounded" />
        </div>
        <div>
           <label for="tags" class="block font-medium">Tagi (oddzielone przecinkami)</label>
           <input type="text" id="tags" placeholder="np. nauka, technologia, programowanie" class="w-full border border-gray-300 p-2 rounded" />
        </div>
        <button type="submit" class="bg-blue-600 text-white font-bold py-3 px-6 rounded hover:bg-blue-700 transition cursor-pointer">
          Dodaj nowy artykuł
        </button>
      </form>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
